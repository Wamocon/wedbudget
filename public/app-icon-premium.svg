<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="App Icon – Premium Dark">
  <defs>
    <linearGradient id="bgPremium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f0e"/>
      <stop offset="55%" stop-color="#1a1409"/>
      <stop offset="100%" stop-color="#0f0c06"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="10%" r="55%">
      <stop offset="0%" stop-color="#b8894e" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#b8894e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldPremium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c47a"/>
      <stop offset="40%" stop-color="#c8974f"/>
      <stop offset="100%" stop-color="#a07843"/>
    </linearGradient>
    <linearGradient id="sagePremium" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a6c4b5"/>
      <stop offset="100%" stop-color="#6d9485"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgPremium)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Rings — both fully visible (Audi-style overlap, no clipping/shading) -->
  <circle cx="196" cy="206" r="90" fill="none" stroke="url(#goldPremium)" stroke-width="28"/>
  <circle cx="316" cy="206" r="90" fill="none" stroke="url(#goldPremium)" stroke-width="28"/>

  <!-- Budget bars -->
  <line x1="144" y1="428" x2="372" y2="428" stroke="url(#goldPremium)" stroke-width="3" stroke-linecap="round" opacity="0.40"/>
  <rect x="156" y="374" width="40" height="54" rx="10" fill="url(#sagePremium)" opacity="0.66"/>
  <rect x="210" y="344" width="40" height="84" rx="10" fill="url(#sagePremium)" opacity="0.82"/>
  <rect x="264" y="356" width="40" height="72" rx="10" fill="url(#sagePremium)"/>
  <rect x="318" y="326" width="40" height="102" rx="10" fill="url(#goldPremium)"/>
</svg>
