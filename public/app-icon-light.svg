<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="App Icon – Light">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf7ee"/>
      <stop offset="100%" stop-color="#f0e8d8"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#a07843"/>
      <stop offset="55%" stop-color="#8f6a3f"/>
      <stop offset="100%" stop-color="#6e5030"/>
    </linearGradient>
    <linearGradient id="sageLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7e998c"/>
      <stop offset="100%" stop-color="#5f7f74"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgLight)"/>

  <!-- Rings — both fully visible (Audi-style overlap, no clipping/shading) -->
  <circle cx="196" cy="206" r="90" fill="none" stroke="url(#goldLight)" stroke-width="28"/>
  <circle cx="316" cy="206" r="90" fill="none" stroke="url(#goldLight)" stroke-width="28"/>

  <!-- Budget bars -->
  <line x1="144" y1="428" x2="372" y2="428" stroke="url(#goldLight)" stroke-width="3" stroke-linecap="round" opacity="0.38"/>
  <rect x="156" y="374" width="40" height="54" rx="10" fill="url(#sageLight)" opacity="0.68"/>
  <rect x="210" y="344" width="40" height="84" rx="10" fill="url(#sageLight)" opacity="0.84"/>
  <rect x="264" y="356" width="40" height="72" rx="10" fill="url(#sageLight)"/>
  <rect x="318" y="326" width="40" height="102" rx="10" fill="url(#goldLight)" opacity="0.92"/>
</svg>
